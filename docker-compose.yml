services:
  db:
    image: postgres:15-alpine
    container_name: analyzer_db
    restart: always
    environment:
      POSTGRES_USER: analyzer_user
      POSTGRES_PASSWORD: analyzer_pass
      POSTGRES_DB: resume_analyzer
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analyzer_user -d resume_analyzer"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: analyzer_backend
    restart: always
    env_file:
      - ./backend/.env
    environment:
      # Override the DATABASE_URL from .env to use the internal Docker network
      - DATABASE_URL=postgresql://analyzer_user:analyzer_pass@db:5432/resume_analyzer
      - APP_ENV=production
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend/temp_uploads:/app/temp_uploads

  frontend:
    build: ./frontend
    container_name: analyzer_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
